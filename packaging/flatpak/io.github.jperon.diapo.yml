app-id: io.github.jperon.diapo
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: diapo
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=host:ro
modules:
  - name: luajit
    no-autogen: true
    make-args:
      - BUILDMODE=dynamic
      - PREFIX=/app
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/LuaJIT/LuaJIT/archive/9d145d2ca3db58493859c495489a0f08f627834f.tar.gz
        sha256: eb74e47ae43f924fc2a30a70266de2a4c141eb38af43639cb275fc72070ebc2c
    cleanup:
      - /bin/luajit-*

  - name: raylib
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DPLATFORM=SDL
      - -DUSE_EXTERNAL_GLFW=OFF
    sources:
      - type: archive
        url: https://github.com/raysan5/raylib/archive/refs/tags/5.5.tar.gz
        sha256: aea98ecf5bc5c5e0b789a76de0083a21a70457050ea4cc2aec7566935f5e258e

  # ── Décodage des formats récents (repli display.load_image via `magick`) ──────────────
  # Le runtime freedesktop ne fournit pas ImageMagick : on le compile avec ses délégués
  # (webp, jp2, heic/avif). Ordre imposé par les dépendances : codecs d'abord, IM en dernier.
  - name: openjpeg
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_CODEC=OFF
    sources:
      - type: archive
        url: https://github.com/uclouvain/openjpeg/archive/refs/tags/v2.5.2.tar.gz
        sha256: 90e3896fed910c376aaf79cdd98bdfdaf98c6472efd8e1debf0a854938cbda6a

  - name: libwebp
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DWEBP_BUILD_CWEBP=OFF
      - -DWEBP_BUILD_DWEBP=OFF
      - -DWEBP_BUILD_GIF2WEBP=OFF
      - -DWEBP_BUILD_IMG2WEBP=OFF
      - -DWEBP_BUILD_VWEBP=OFF
      - -DWEBP_BUILD_WEBPINFO=OFF
      - -DWEBP_BUILD_WEBPMUX=OFF
      - -DWEBP_BUILD_ANIM_UTILS=OFF
      - -DWEBP_BUILD_EXTRAS=OFF
    sources:
      - type: archive
        url: https://github.com/webmproject/libwebp/archive/refs/tags/v1.4.0.tar.gz
        sha256: 12af50c45530f0a292d39a88d952637e43fb2d4ab1883c44ae729840f7273381

  - name: libde265
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DENABLE_SDL=OFF
    sources:
      - type: archive
        url: https://github.com/strukturag/libde265/releases/download/v1.0.15/libde265-1.0.15.tar.gz
        sha256: 00251986c29d34d3af7117ed05874950c875dd9292d016be29d3b3762666511d

  - name: libaom
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DENABLE_TESTS=OFF
      - -DENABLE_DOCS=OFF
      - -DENABLE_EXAMPLES=OFF
      - -DENABLE_TOOLS=OFF
    sources:
      - type: archive
        url: https://storage.googleapis.com/aom-releases/libaom-3.9.1.tar.gz
        sha256: dba99fc1c28aaade28dda59821166b2fa91c06162d1bc99fde0ddaad7cecc50e

  - name: libheif
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DWITH_EXAMPLES=OFF
      - -DWITH_GDK_PIXBUF=OFF
    sources:
      - type: archive
        url: https://github.com/strukturag/libheif/releases/download/v1.18.2/libheif-1.18.2.tar.gz
        sha256: c4002a622bec9f519f29d84bfdc6024e33fd67953a5fb4dc2c2f11f67d5e45bf

  - name: imagemagick
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --enable-shared
      - --with-modules
      - --without-x
      - --without-magick-plus-plus
      - --disable-docs
      - --with-webp=yes
      - --with-openjp2=yes
      - --with-heic=yes
    cleanup:
      - /share/man
      - /share/doc
    sources:
      - type: archive
        url: https://github.com/ImageMagick/ImageMagick/archive/refs/tags/7.1.1-43.tar.gz
        sha256: ceb972266b23dc7c1cfce0da5a7f0c9acfb4dc81f40eb542a49476fedbc2618f

  - name: diapo
    buildsystem: simple
    build-commands:
      # Wrapper libfacedetection (YuNet) + worker async, compilés en .so.
      - >-
        g++ -O3 -fPIC -shared -std=c++11
        -I libfacedetection/src -I diapo/csrc -I /app/include/luajit-2.1
        -fvisibility=hidden
        libfacedetection/src/*.cpp
        diapo/csrc/facedetect_wrap.cpp diapo/csrc/worker.cpp
        -L /app/lib -lluajit-5.1 -lpthread
        -o libfacedetection.so
      - install -Dm644 libfacedetection.so /app/share/diapo/lib/libfacedetection.so
      - cp -r diapo/src diapo/ffi diapo/assets /app/share/diapo/
      - install -Dm644 diapo/config.example.lua /app/share/diapo/config.example.lua
      - install -Dm755 diapo/diapo-launcher.sh /app/bin/diapo
      - install -Dm644 diapo/assets/io.github.jperon.diapo.svg
        /app/share/icons/hicolor/scalable/apps/io.github.jperon.diapo.svg
      - install -Dm644 diapo/assets/io.github.jperon.diapo.metainfo.xml
        /app/share/metainfo/io.github.jperon.diapo.metainfo.xml
      - install -Dm644 diapo/assets/io.github.jperon.diapo.desktop
        /app/share/applications/io.github.jperon.diapo.desktop
    sources:
      - type: archive
        path: diapo-src.tar.gz
        strip-components: 0
      - type: git
        url: https://github.com/ShiqiYu/libfacedetection.git
        commit: 3023e1289e3b85311632bcfd45c9895b4292778b
        dest: libfacedetection
